name: Validate Preview PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-preview-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  validate-generated-docs:
    if: github.repository == 'caamp-jp/preview'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate generated docs
        run: scripts/check_generated_docs.sh
